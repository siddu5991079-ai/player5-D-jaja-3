
name: 24/7 OS-Level Live Stream

on:
  workflow_dispatch:
    inputs:
      TARGET_URL:
        description: 'Target Stream URL'
        required: true
        default: 'https://dadocric.st/player.php?id=starsp3&v=m'
      OKRU_STREAM_ID:
        description: 'OK.ru Channel ID (1-8)'
        required: true
        default: '1'
      STREAM_QUALITY:
        description: 'Quality (Balanced 480p or 40KBps)'
        required: true
        default: '110KBps (Balanced 480p)'

jobs:
  recording_stream:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies (FFmpeg, Xvfb, PulseAudio)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg xvfb pulseaudio alsa-utils

      - name: Setup Virtual Audio (PulseAudio) & Display (Xvfb)
        run: |
          # Fake Audio Device (Speakers) banana
          pulseaudio -D --exit-idle-time=-1
          pacmd load-module module-virtual-sink sink_name=v1
          pacmd set-default-sink v1
          pacmd set-default-source v1.monitor
          
          # Fake Screen (Display :99) banana
          Xvfb :99 -screen 0 1280x720x24 &
          
      - name: Install NPM Packages
        run: |
          npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth

      - name: Start Recording & Streaming
        env:
          DISPLAY: :99
          TARGET_URL: ${{ github.event.inputs.TARGET_URL }}
          OKRU_STREAM_ID: ${{ github.event.inputs.OKRU_STREAM_ID }}
          STREAM_QUALITY: ${{ github.event.inputs.STREAM_QUALITY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: node stream.js
        







